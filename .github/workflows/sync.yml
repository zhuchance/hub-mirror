name: Sync Multi-Images to Aliyun

on:
  workflow_dispatch:
    inputs:
      images:
        description: '请输入镜像列表（每行一个，支持换行）'
        required: true
        type: textarea
        default: |
          alpine:latest
          nginx:stable

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALiyun_USER }}
          password: ${{ secrets.ALiyun_PWD }}

      - name: Pull and Push Images
        run: |
          # 使用 echo 配合 while read 处理多行输入
          echo "${{ github.event.inputs.images }}" | while IFS= read -r line || [[ -n "$line" ]]; do
            # 1. 过滤空行和空格
            SOURCE_IMAGE=$(echo "$line" | xargs)
            [ -z "$SOURCE_IMAGE" ] && continue
            
            echo "--------------------------------"
            echo "正在处理: $SOURCE_IMAGE"
            
            # 2. 自动处理目标名称
            # 将 gcr.io/distroless/static:latest 转换为 static:latest
            IMAGE_NAME_TAG=$(echo $SOURCE_IMAGE | awk -F'/' '{print $NF}')
            TARGET_IMAGE="registry.cn-hangzhou.aliyuncs.com/zhuchance/${IMAGE_NAME_TAG}"
            
            # 3. 执行同步
            if docker pull $SOURCE_IMAGE; then
              docker tag $SOURCE_IMAGE $TARGET_IMAGE
              docker push $TARGET_IMAGE
              echo "✅ 成功: $TARGET_IMAGE"
            else
              echo "❌ 失败: 无法拉取镜像 $SOURCE_IMAGE"
            fi
          done
