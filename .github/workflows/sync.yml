name: Sync Multi-Images to Aliyun

on:
  workflow_dispatch:
    inputs:
      images:
        description: '请输入镜像列表（每行一个）'
        required: true
        type: textarea
        default: |
          alpine:latest
          nginx:stable

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALiyun_USER }}
          password: ${{ secrets.ALiyun_PWD }}

      - name: Pull and Push Images
        env:
          RAW_IMAGES: ${{ github.event.inputs.images }}
        run: |
          echo "$RAW_IMAGES" > images_list.txt
          while IFS= read -r line || [[ -n "$line" ]]; do
            SOURCE_IMAGE=$(echo "$line" | sed 's/\r//g' | xargs)
            [ -z "$SOURCE_IMAGE" ] && continue
            
            echo "--------------------------------"
            echo "正在处理: $SOURCE_IMAGE"
            
            IMAGE_NAME_TAG=$(echo $SOURCE_IMAGE | awk -F'/' '{print $NF}')
            TARGET_IMAGE="registry.cn-hangzhou.aliyuncs.com/zhuchance/${IMAGE_NAME_TAG}"
            
            if docker pull $SOURCE_IMAGE; then
              docker tag $SOURCE_IMAGE $TARGET_IMAGE
              docker push $TARGET_IMAGE
              echo "✅ 成功: $TARGET_IMAGE"
            else
              echo "❌ 失败: $SOURCE_IMAGE"
            fi
          done < images_list.txt
