name: Sync Images via Issue

on:
  issues:
    types: [opened, edited]

# 全局环境变量，解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync:
    if: contains(github.event.issue.title, 'sync') && github.event.issue.user.login == 'zhuchance'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALiyun_USER }}
          password: ${{ secrets.ALiyun_PWD }}

      - name: Process Images
        env:
          # 关键：通过环境变量把 Issue 正文传进去，避免 Shell 注入
          RAW_BODY: ${{ github.event.issue.body }}
        run: |
          # 将环境变量内容安全写入文件，保留换行
          printf "%s" "$RAW_BODY" > raw_images.txt

          # 逐行读取并清理
          while IFS= read -r line || [[ -n "$line" ]]; do
            # 1. 彻底清除回车符、反引号、前后空格
            CLEAN_IMG=$(echo "$line" | tr -d '\r' | tr -d '`' | xargs)
            
            # 2. 跳过空行和带有空格的无关行（比如正文里的描述文字）
            [[ -z "$CLEAN_IMG" ]] && continue
            [[ "$CLEAN_IMG" == *" "* ]] && continue

            echo "--------------------------------"
            echo "正在同步: [$CLEAN_IMG]"
            
            # 3. 提取短名（例如 library/nginx:latest -> nginx:latest）
            IMAGE_NAME_TAG=$(echo "$CLEAN_IMG" | awk -F'/' '{print $NF}')
            TARGET="registry.cn-hangzhou.aliyuncs.com/mgfw/${IMAGE_NAME_TAG}"
            
            # 4. 拉取推送
            if docker pull "$CLEAN_IMG"; then
              docker tag "$CLEAN_IMG" "$TARGET"
              docker push "$TARGET"
              echo "✅ 成功: $TARGET"
            else
              echo "❌ 失败: $CLEAN_IMG"
            fi
          done < raw_images.txt

      - name: Success Comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **同步已完成！**\nNode 24 环境运行正常，镜像已推送到阿里云。'
            })
